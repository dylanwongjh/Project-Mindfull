<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindfulCompanion - Mental Wellbeing Support</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-heart"></i> MindfulCompanion</h1>
            <p>Your friendly AI mental wellbeing assistant</p>
        </header>

        <div class="disclaimer">
            <p><strong>Important:</strong> I'm here to listen and support you, but I'm not a replacement for professional help. If you're in crisis, please contact a mental health professional.</p>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                </div>
        </div>

        <div class="input-area">
            <div class="typing-indicator" id="typingIndicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <textarea id="userInput" placeholder="Type your message here..."></textarea>
            <button id="sendButton"><i class="fas fa-paper-plane"></i> Send</button>
        </div>

        <div class="resources-panel">
            <h3>Mental Health Resources</h3>
            <div id="resourcesContent">
                <p>Click below to view crisis resources</p>
            </div>
            <button id="resourcesButton">Show Crisis Resources</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
